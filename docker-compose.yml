services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - mysql
      - redis
    environment:
      - TZ=America/Sao_Paulo

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: intranet_dev_root
      MYSQL_DATABASE: intranet
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine

volumes:
  mysql_data:
