services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - mysql
      - redis
    environment:
      - TZ=America/Sao_Paulo

  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/html/intranet-new
    entrypoint: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      - TZ=America/Sao_Paulo

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: intranet_dev_root
      MYSQL_DATABASE: intranet
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin_dev) do echo 'aguardando minio...' && sleep 2; done;
      mc mb -p local/repositorio;
      exit 0;
      "

  onlyoffice:
    image: onlyoffice/documentserver
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=troque_essa_chave_super_secreta_onlyoffice
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    ports:
      - "8082:80"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    environment:
      - SECURITY_ENABLELOGIN=false
      - SYSTEM_DEFAULTLOCALE=pt-BR
      - UI_APPNAME=Stirling PDF
    volumes:
      - stirling_pdf_data:/usr/share/tessdata
      - stirling_pdf_config:/configs
    ports:
      - "8083:8080"

  paperless-redis:
    image: redis:7-alpine
    volumes:
      - paperless_redis_data:/data

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless-redis
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_SECRET_KEY=troque_essa_chave_super_secreta_paperless
      - PAPERLESS_TIME_ZONE=America/Sao_Paulo
      - PAPERLESS_OCR_LANGUAGE=por
      - PAPERLESS_OCR_LANGUAGES=por
      - PAPERLESS_OCR_OUTPUT_TYPE=pdf
      - 'PAPERLESS_OCR_USER_ARGS={"optimize": 2, "jpeg_quality": 70}'
      - PAPERLESS_ADMIN_USER=admin
      - PAPERLESS_ADMIN_PASSWORD=troque_essa_senha_super_secreta_paperless
      - PAPERLESS_POST_CONSUME_SCRIPT=/usr/src/paperless/scripts/post-consume-webhook.sh
      - INTRANET_WEBHOOK_URL=http://app/webhooks/paperless
      - INTRANET_WEBHOOK_SECRET=troque_essa_chave_super_secreta_webhook_paperless
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - ./docker/paperless/scripts:/usr/src/paperless/scripts:ro
    ports:
      - "8084:8000"

volumes:
  mysql_data:
  minio_data:
  onlyoffice_data:
  stirling_pdf_data:
  stirling_pdf_config:
  paperless_redis_data:
  paperless_data:
  paperless_media:
